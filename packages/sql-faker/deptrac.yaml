deptrac:
  paths:
    - ./src
    - ./spec

  layers:
    - name: Contract
      collectors:
        - type: directory
          value: '^.*/src/Contract/.*\.php$'

    - name: SqlFakerImplementation
      collectors:
        - type: bool
          must:
            - type: directory
              value: '^.*/src/.*\.php$'
          must_not:
            - type: directory
              value: '^.*/src/Contract/.*\.php$'

    - name: Spec
      collectors:
        - type: directory
          value: '^.*/spec/.*\.php$'

  ruleset:
    Contract: []
    SqlFakerImplementation:
      - Contract
    Spec:
      - Contract
