name: CI (phpstan-custom-rules)

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'packages/phpstan-custom-rules/**'
      - '.github/workflows/phpstan-custom-rules.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: packages/phpstan-custom-rules

jobs:
  test:
    name: Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/phpstan-custom-rules
      - run: composer test:unit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/phpstan-custom-rules
      - run: composer lint
