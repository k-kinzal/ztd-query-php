name: CI (sql-faker)

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'packages/sql-faker/**'
      - 'packages/phpstan-custom-rules/**'
      - '.github/workflows/sql-faker.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: packages/sql-faker

jobs:
  test:
    name: Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/sql-faker
      - run: composer test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/sql-faker
      - run: composer lint

  snapshot-build:
    name: Snapshot Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/sql-faker
      - run: composer build:verify

  spec-mysql:
    name: Spec (MySQL ${{ matrix.mysql_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mysql_version: ['mysql-5.6.51', 'mysql-5.7.44', 'mysql-8.0.44', 'mysql-8.1.0', 'mysql-8.2.0', 'mysql-8.3.0', 'mysql-8.4.7', 'mysql-9.0.1', 'mysql-9.1.0']
    env:
      MYSQL_VERSION: ${{ matrix.mysql_version }}
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, pdo_mysql
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/sql-faker
      - run: php bin/spec.php all --dialect=mysql

  spec-other:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo, pdo_pgsql, pdo_sqlite
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/sql-faker
      - run: php bin/spec.php all --dialect=postgresql
      - run: php bin/spec.php all --dialect=sqlite

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/sql-faker
      - run: composer bench

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring
          coverage: pcov
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/sql-faker
      - name: infection
        env:
          GIT_CONFIG_COUNT: 1
          GIT_CONFIG_KEY_0: diff.relative
          GIT_CONFIG_VALUE_0: 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin $GITHUB_BASE_REF
            php -d memory_limit=1024M vendor/bin/infection \
              --threads=max \
              --git-diff-lines \
              --git-diff-base=origin/$GITHUB_BASE_REF \
              --initial-tests-php-options='-d memory_limit=1024M' \
              --min-covered-msi=100 \
              --ignore-msi-with-no-mutations \
              --only-covering-test-cases \
              --no-progress \
              --logger-github
          else
            php -d memory_limit=1024M vendor/bin/infection \
              --threads=max \
              --initial-tests-php-options='-d memory_limit=1024M' \
              --min-covered-msi=80 \
              --no-progress \
              --logger-github
          fi
