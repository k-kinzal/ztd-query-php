name: CI (ztd-query-mysqli-adapter)

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'packages/ztd-query-mysqli-adapter/**'
      - 'packages/ztd-query-mysql/**'
      - 'packages/ztd-query-core/**'
      - 'packages/sql-faker/**'
      - 'packages/sql-fixture/**'
      - 'packages/phpstan-custom-rules/**'
      - '.github/workflows/ztd-query-mysqli-adapter.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: packages/ztd-query-mysqli-adapter

jobs:
  test-unit:
    name: Unit Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, mysqli
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/ztd-query-mysqli-adapter
      - run: composer test:unit

  test-integration:
    name: Integration (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, mysqli
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/ztd-query-mysqli-adapter
      - run: composer test:integration

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring
          coverage: none
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/ztd-query-mysqli-adapter
      - run: composer lint

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, mysqli
          coverage: pcov
      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/ztd-query-mysqli-adapter
      - name: infection
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin $GITHUB_BASE_REF
            php -d memory_limit=256M vendor/bin/infection \
              --threads=max \
              --git-diff-lines \
              --git-diff-base=origin/$GITHUB_BASE_REF \
              --min-covered-msi=100 \
              --ignore-msi-with-no-mutations \
              --only-covering-test-cases \
              --no-progress \
              --logger-github
          else
            php -d memory_limit=512M vendor/bin/infection \
              --threads=max \
              --min-covered-msi=80 \
              --no-progress \
              --logger-github
          fi
