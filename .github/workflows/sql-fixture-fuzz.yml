name: Fuzz (sql-fixture)

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      max_runs:
        description: 'Max fuzzing iterations'
        default: '10000'
        type: string

permissions:
  contents: read
  issues: write

jobs:
  fuzz:
    name: ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: create-table, script: fuzz_create_table.php, corpus: create-table, extensions: "mbstring, pcntl" }
          - { name: insert-select, script: fuzz_insert_select.php, corpus: insert-select, extensions: "mbstring, pcntl, pdo, pdo_mysql" }
    defaults:
      run:
        working-directory: packages/sql-fixture
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: ${{ matrix.target.extensions }}
          coverage: none

      - uses: ramsey/composer-install@v3
        with:
          working-directory: packages/sql-fixture

      - uses: actions/cache/restore@v5
        with:
          path: packages/sql-fixture/fuzz/corpus/${{ matrix.target.corpus }}
          key: fuzz-sql-fixture-${{ matrix.target.corpus }}-${{ github.run_id }}
          restore-keys: |
            fuzz-sql-fixture-${{ matrix.target.corpus }}-

      - name: fuzzer
        run: |
          vendor/bin/php-fuzzer fuzz fuzz/${{ matrix.target.script }} \
            fuzz/corpus/${{ matrix.target.corpus }}/ \
            --max-runs=${{ inputs.max_runs || '10000' }}

      - if: always()
        uses: actions/cache/save@v5
        with:
          path: packages/sql-fixture/fuzz/corpus/${{ matrix.target.corpus }}
          key: fuzz-sql-fixture-${{ matrix.target.corpus }}-${{ github.run_id }}

      - if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: fuzz-crashes-sql-fixture-${{ matrix.target.name }}
          path: |
            packages/sql-fixture/fuzz/corpus/${{ matrix.target.corpus }}/crash-*
            packages/sql-fixture/fuzz/corpus/${{ matrix.target.corpus }}/timeout-*

  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [fuzz]
    if: failure()
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'fuzz',
              state: 'open'
            });
            if (issues.length > 0) {
              console.log('Open fuzz issue already exists, skipping creation');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Fuzz: Crash detected (sql-fixture)`,
              body: `Fuzzing found a crash.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nCheck the uploaded artifacts for crash details.`,
              labels: ['bug', 'fuzz']
            });
